name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make TrailPrint3D better? Fill this out and it'll be considered for a future version.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - Map / Trail Generation
        - Terrain Elements (water, forests, roads, etc.)
        - Post-Processing tools
        - Export
        - Addon Preferences / UI
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the limitation or gap in the current addon.
      placeholder: "When I try to... I can't... because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature you'd like
      description: What would the ideal solution look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you currently use or other approaches that might work.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, references, examples from other tools — anything helpful.
    validations:
      required: false
